<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1A1A1A">
    <title>Boxing Rounder - 专业拳击计时器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg-primary: #1A1A1A;
            --bg-secondary: #2a2a2a;
            --accent-orange: #E85D04;
            --accent-gold: #daa520;
            --text-primary: #ffffff;
            --text-secondary: #8BA5A3;
            --border-color: #8BA5A3;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            background: var(--bg-primary);
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid var(--accent-orange);
        }
        
        .header h1 {
            color: var(--accent-orange);
            font-size: 24px;
            margin-bottom: 5px;
        }
        
        .header p {
            color: var(--text-secondary);
            font-size: 12px;
        }
        
        .page {
            display: none;
            flex: 1;
            flex-direction: column;
            padding: 20px;
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
        }
        
        .page.active {
            display: flex;
        }
        
        .settings-card {
            background: var(--bg-secondary);
            border: 2px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 15px;
        }
        
        .setting-item {
            margin-bottom: 20px;
        }
        
        .setting-label {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 10px;
        }
        
        .setting-value {
            color: var(--accent-orange);
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            margin: 10px 0;
        }
        
        .slider-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .slider-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid var(--accent-orange);
            background: transparent;
            color: var(--accent-orange);
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .slider-btn:hover {
            background: var(--accent-orange);
            color: white;
        }
        
        input[type="range"] {
            flex: 1;
            height: 8px;
            background: var(--bg-primary);
            border-radius: 4px;
            outline: none;
            -webkit-appearance: none;
        }
        
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            background: var(--accent-orange);
            border-radius: 50%;
            cursor: pointer;
        }
        
        .total-time {
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, rgba(232, 93, 4, 0.1) 0%, rgba(232, 93, 4, 0.05) 100%);
            border-radius: 12px;
            margin-bottom: 20px;
        }
        
        .total-time-label {
            color: var(--text-secondary);
            font-size: 12px;
            margin-bottom: 5px;
        }
        
        .total-time-value {
            color: var(--accent-orange);
            font-size: 32px;
            font-weight: bold;
        }
        
        .start-btn {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid var(--accent-orange);
            background: transparent;
            color: var(--accent-orange);
            font-size: 48px;
            cursor: pointer;
            margin: 20px auto;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .start-btn:hover {
            background: var(--accent-orange);
            color: white;
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(232, 93, 4, 0.5);
        }
        
        .timer-display {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .phase-indicator {
            color: var(--accent-gold);
            font-size: 18px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .round-indicator {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 30px;
        }
        
        .timer-circle {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            border: 4px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: radial-gradient(circle, rgba(139, 165, 163, 0.1) 0%, transparent 70%);
        }
        
        .timer-circle.fight {
            border-color: var(--accent-orange);
            box-shadow: 0 0 40px rgba(232, 93, 4, 0.3);
        }
        
        .timer-circle.rest {
            border-color: #2ecc71;
        }
        
        .timer-circle.prepare {
            border-color: #f39c12;
            animation: pulse 1s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }
        
        .timer-text {
            font-size: 64px;
            font-weight: bold;
            color: var(--text-primary);
            font-variant-numeric: tabular-nums;
        }
        
        .controls-row {
            display: flex;
            gap: 20px;
            margin-top: 40px;
        }
        
        .control-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 2px solid var(--text-secondary);
            background: transparent;
            color: var(--text-secondary);
            font-size: 24px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .control-btn:hover {
            border-color: var(--accent-orange);
            color: var(--accent-orange);
        }
        
        .complete-page {
            text-align: center;
            justify-content: center;
        }
        
        .complete-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
        
        .complete-title {
            color: var(--accent-orange);
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .complete-message {
            color: var(--text-secondary);
            font-size: 18px;
            margin-bottom: 40px;
        }
        
        .back-btn {
            background: var(--accent-orange);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .back-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(232, 93, 4, 0.4);
        }
        
        .back-arrow {
            position: absolute;
            top: 20px;
            left: 20px;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 24px;
            cursor: pointer;
            padding: 10px;
        }
        
        .timer-header {
            position: relative;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>
    <!-- 设置页 -->
    <div id="settingsPage" class="page active">
        <div class="header">
            <h1>Boxing Rounder</h1>
            <p>专业拳击计时器</p>
        </div>
        
        <div class="total-time">
            <div class="total-time-label">总训练时长</div>
            <div class="total-time-value" id="totalTime">45:00</div>
        </div>
        
        <div class="settings-card">
            <div class="setting-item">
                <div class="setting-label">
                    <span>⏱️</span>
                    <span>回合时长</span>
                </div>
                <div class="setting-value" id="roundTimeValue">3:00</div>
                <div class="slider-container">
                    <button class="slider-btn" onclick="adjustTime('round', -10)">-</button>
                    <input type="range" id="roundSlider" min="10" max="600" value="180" oninput="updateSettings()">
                    <button class="slider-btn" onclick="adjustTime('round', 10)">+</button>
                </div>
            </div>
            
            <div class="setting-item">
                <div class="setting-label">
                    <span>⏸️</span>
                    <span>休息时间</span>
                </div>
                <div class="setting-value" id="restTimeValue">1:00</div>
                <div class="slider-container">
                    <button class="slider-btn" onclick="adjustTime('rest', -10)">-</button>
                    <input type="range" id="restSlider" min="10" max="300" value="60" oninput="updateSettings()">
                    <button class="slider-btn" onclick="adjustTime('rest', 10)">+</button>
                </div>
            </div>
            
            <div class="setting-item">
                <div class="setting-label">
                    <span>🔢</span>
                    <span>回合数</span>
                </div>
                <div class="setting-value" id="roundsValue">15</div>
                <div class="slider-container">
                    <button class="slider-btn" onclick="adjustRounds(-1)">-</button>
                    <input type="range" id="roundsSlider" min="1" max="30" value="15" oninput="updateSettings()">
                    <button class="slider-btn" onclick="adjustRounds(1)">+</button>
                </div>
            </div>
        </div>
        
        <button class="start-btn" onclick="startWorkout()">▶</button>
    </div>

    <!-- 计时运行页 -->
    <div id="timerPage" class="page">
        <div class="timer-header">
            <button class="back-arrow" onclick="stopWorkout()">←</button>
            <h2 id="timerTitle">Fight</h2>
        </div>
        
        <div class="timer-display">
            <div class="phase-indicator" id="phaseText">GET READY</div>
            <div class="round-indicator" id="roundText">1 / 15</div>
            
            <div class="timer-circle prepare" id="timerCircle">
                <div class="timer-text" id="timerDisplay">3</div>
            </div>
            
            <div class="controls-row">
                <button class="control-btn" id="pauseBtn" onclick="togglePause()">⏸</button>
            </div>
        </div>
    </div>

    <!-- 完成页 -->
    <div id="completePage" class="page complete-page">
        <div class="complete-icon">🏆</div>
        <div class="complete-title">Workout Complete!</div>
        <div class="complete-message">Great job! 👏</div>
        <button class="back-btn" onclick="backToSettings()">返回首页</button>
    </div>

    <script>
        // ==================== 音频系统 ====================
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        // 1. 华为Petal倒计时：3声，1秒1声（2000Hz，50ms）
        function playCountdown3() {
            if (!audioCtx) return;
            const t = audioCtx.currentTime;
            
            // 3声，间隔1秒
            for (let i = 0; i < 3; i++) {
                const startTime = t + i * 1.0;
                
                // 基频 2000Hz
                const osc1 = audioCtx.createOscillator();
                const gain1 = audioCtx.createGain();
                osc1.type = 'sine';
                osc1.frequency.value = 2000;
                
                // ASR包络：10ms攻击 → 30ms保持 → 10ms衰减
                gain1.gain.setValueAtTime(0, startTime);
                gain1.gain.linearRampToValueAtTime(0.46, startTime + 0.01);
                gain1.gain.setValueAtTime(0.46, startTime + 0.04);
                gain1.gain.linearRampToValueAtTime(0, startTime + 0.05);
                
                // 谐波 4000Hz (5%)
                const osc2 = audioCtx.createOscillator();
                const gain2 = audioCtx.createGain();
                osc2.type = 'sine';
                osc2.frequency.value = 4000;
                
                gain2.gain.setValueAtTime(0, startTime);
                gain2.gain.linearRampToValueAtTime(0.025, startTime + 0.01);
                gain2.gain.setValueAtTime(0.025, startTime + 0.04);
                gain2.gain.linearRampToValueAtTime(0, startTime + 0.05);
                
                osc1.connect(gain1);
                gain1.connect(audioCtx.destination);
                osc2.connect(gain2);
                gain2.connect(audioCtx.destination);
                
                osc1.start(startTime);
                osc2.start(startTime);
                osc1.stop(startTime + 0.05);
                osc2.stop(startTime + 0.05);
            }
        }

        // 2. 手掌锣开场铃：1声（400Hz，3秒）
        function playOpeningGong() {
            if (!audioCtx) return;
            createGongSound(400, 3.0, audioCtx.currentTime);
        }

        // 3. 手掌锣结束铃：2声（400Hz，3秒，间隔300ms）
        function playEndGong() {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            createGongSound(400, 3.0, now);
            createGongSound(400, 3.0, now + 0.3);
        }

        // 手掌锣合成核心
        function createGongSound(baseFreq, duration, startTime) {
            const t = startTime || audioCtx.currentTime;
            const brightness = 0.8;
            
            const masterGain = audioCtx.createGain();
            masterGain.connect(audioCtx.destination);
            
            const harmonics = [1.0, 1.4, 1.9, 2.4, 3.1, 4.2, 5.5, 7.1];
            const harmonicAmps = [1.0, 0.7, 0.5, 0.35, 0.25, 0.18, 0.12, 0.08];
            
            harmonics.forEach((ratio, index) => {
                const freq = baseFreq * ratio;
                const baseAmp = harmonicAmps[index];
                const brightnessBoost = (index > 2) ? brightness : 1.0;
                const amplitude = baseAmp * brightnessBoost * 0.4;
                
                const decayFactor = 1.0 - (index * 0.1);
                const decayTime = duration * Math.max(decayFactor, 0.2);
                
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                osc.type = index < 2 ? 'sine' : 'triangle';
                osc.frequency.value = freq;
                
                gain.gain.setValueAtTime(0, t);
                gain.gain.linearRampToValueAtTime(amplitude, t + 0.005);
                gain.gain.setTargetAtTime(0.001, t + 0.005, decayTime * 0.2);
                
                osc.connect(gain);
                gain.connect(masterGain);
                
                osc.start(t);
                osc.stop(t + duration);
            });
            
            // 低频嗡声
            const humOsc = audioCtx.createOscillator();
            const humGain = audioCtx.createGain();
            humOsc.type = 'sine';
            humOsc.frequency.value = baseFreq * 0.5;
            humGain.gain.setValueAtTime(0, t);
            humGain.gain.linearRampToValueAtTime(0.15, t + 0.01);
            humGain.gain.setTargetAtTime(0.001, t + 0.01, duration * 0.4);
            humOsc.connect(humGain);
            humGain.connect(masterGain);
            humOsc.start(t);
            humOsc.stop(t + duration);
            
            // 颤音
            const lfo = audioCtx.createOscillator();
            const lfoGain = audioCtx.createGain();
            lfo.frequency.value = 10;
            lfoGain.gain.value = 0.1;
            lfo.connect(lfoGain);
            lfoGain.connect(masterGain.gain);
            lfo.start(t);
            lfo.stop(t + duration * 0.5);
            
            // 打击噪声
            const noiseBuffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.1, audioCtx.sampleRate);
            const noiseData = noiseBuffer.getChannelData(0);
            for (let i = 0; i < noiseData.length; i++) {
                noiseData[i] = (Math.random() * 2 - 1) * Math.exp(-i / (audioCtx.sampleRate * 0.02));
            }
            const noise = audioCtx.createBufferSource();
            noise.buffer = noiseBuffer;
            const noiseGain = audioCtx.createGain();
            noiseGain.gain.setValueAtTime(0.15, t);
            noiseGain.gain.exponentialRampToValueAtTime(0.01, t + 0.1);
            noise.connect(noiseGain);
            noiseGain.connect(masterGain);
            noise.start(t);
        }

        // ==================== 计时器逻辑 ====================
        let settings = {
            roundTime: 180,
            restTime: 60,
            rounds: 15
        };
        
        let timerState = {
            currentRound: 1,
            phase: 'prepare',
            timeLeft: 3,
            isPaused: false,
            intervalId: null
        };

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function updateSettings() {
            settings.roundTime = parseInt(document.getElementById('roundSlider').value);
            settings.restTime = parseInt(document.getElementById('restSlider').value);
            settings.rounds = parseInt(document.getElementById('roundsSlider').value);
            
            document.getElementById('roundTimeValue').textContent = formatTime(settings.roundTime);
            document.getElementById('restTimeValue').textContent = formatTime(settings.restTime);
            document.getElementById('roundsValue').textContent = settings.rounds;
            
            const total = (settings.roundTime + settings.restTime) * settings.rounds - settings.restTime;
            document.getElementById('totalTime').textContent = formatTime(total);
        }

        function adjustTime(type, delta) {
            const slider = document.getElementById(type + 'Slider');
            let newValue = parseInt(slider.value) + delta;
            newValue = Math.max(parseInt(slider.min), Math.min(parseInt(slider.max), newValue));
            slider.value = newValue;
            updateSettings();
        }

        function adjustRounds(delta) {
            const slider = document.getElementById('roundsSlider');
            let newValue = parseInt(slider.value) + delta;
            newValue = Math.max(parseInt(slider.min), Math.min(parseInt(slider.max), newValue));
            slider.value = newValue;
            updateSettings();
        }

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }

        function startWorkout() {
            initAudio();
            timerState.currentRound = 1;
            timerState.phase = 'prepare';
            timerState.timeLeft = 3;
            timerState.isPaused = false;
            
            showPage('timerPage');
            updateTimerDisplay();
            
            // 准备阶段开始播放3声倒计时
            playCountdown3();
            
            startTimer();
        }

        function startTimer() {
            if (timerState.intervalId) clearInterval(timerState.intervalId);
            
            timerState.intervalId = setInterval(() => {
                if (timerState.isPaused) return;
                
                timerState.timeLeft--;
                
                // 音效触发逻辑
                handleSounds();
                
                if (timerState.timeLeft <= 0) {
                    phaseTransition();
                }
                
                updateTimerDisplay();
            }, 1000);
        }

        function handleSounds() {
            const { phase, timeLeft } = timerState;
            
            // 回合最后3秒：播放倒计时3声
            if (phase === 'round' && timeLeft === 3) {
                playCountdown3();
            }
            
            // 休息最后3秒：播放倒计时3声（这就是"准备开始"的信号）
            if (phase === 'rest' && timeLeft === 3) {
                playCountdown3();
            }
        }

        function phaseTransition() {
            const { phase, currentRound } = timerState;
            
            switch(phase) {
                case 'prepare':
                    // 准备结束，开始回合
                    timerState.phase = 'round';
                    timerState.timeLeft = settings.roundTime;
                    playOpeningGong(); // 手掌锣1声
                    break;
                    
                case 'round':
                    // 回合结束
                    playEndGong(); // 手掌锣2声
                    
                    if (currentRound >= settings.rounds) {
                        completeWorkout();
                        return;
                    }
                    
                    timerState.phase = 'rest';
                    timerState.timeLeft = settings.restTime;
                    break;
                    
                case 'rest':
                    // 休息结束，下一回合开始
                    // 注意：休息最后3秒已经播放了倒计时3声，这里直接进入回合
                    timerState.currentRound++;
                    timerState.phase = 'round';
                    timerState.timeLeft = settings.roundTime;
                    playOpeningGong(); // 手掌锣1声（开始战斗！）
                    break;
            }
            
            updateTimerDisplay();
        }

        function updateTimerDisplay() {
            const { phase, timeLeft, currentRound } = timerState;
            
            const phaseTexts = {
                prepare: 'GET READY',
                round: 'ROUND',
                rest: 'REST'
            };
            
            document.getElementById('phaseText').textContent = phaseTexts[phase];
            document.getElementById('roundText').textContent = 
                phase === 'complete' ? '' : `${currentRound} / ${settings.rounds}`;
            document.getElementById('timerDisplay').textContent = 
                phase === 'prepare' ? timeLeft : formatTime(timeLeft);
            
            const circle = document.getElementById('timerCircle');
            circle.className = 'timer-circle';
            if (phase === 'round') circle.classList.add('fight');
            if (phase === 'rest') circle.classList.add('rest');
            if (phase === 'prepare') circle.classList.add('prepare');
        }

        function togglePause() {
            timerState.isPaused = !timerState.isPaused;
            document.getElementById('pauseBtn').textContent = timerState.isPaused ? '▶' : '⏸';
        }

        function stopWorkout() {
            if (timerState.intervalId) clearInterval(timerState.intervalId);
            showPage('settingsPage');
        }

        function completeWorkout() {
            if (timerState.intervalId) clearInterval(timerState.intervalId);
            setTimeout(() => {
                showPage('completePage');
                playApplause();
            }, 500);
        }

        function backToSettings() {
            showPage('settingsPage');
        }

        function playApplause() {
            if (!audioCtx) return;
            const t = audioCtx.currentTime;
            
            for (let i = 0; i < 30; i++) {
                const noiseBuffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.1, audioCtx.sampleRate);
                const noiseData = noiseBuffer.getChannelData(0);
                for (let j = 0; j < noiseData.length; j++) {
                    noiseData[j] = (Math.random() * 2 - 1);
                }
                
                const noise = audioCtx.createBufferSource();
                noise.buffer = noiseBuffer;
                
                const filter = audioCtx.createBiquadFilter();
                filter.type = 'bandpass';
                filter.frequency.value = 1000 + Math.random() * 2000;
                filter.Q.value = 1;
                
                const gain = audioCtx.createGain();
                const startTime = t + Math.random() * 2;
                gain.gain.setValueAtTime(0, startTime);
                gain.gain.linearRampToValueAtTime(0.3, startTime + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.01, startTime + 0.3);
                
                noise.connect(filter);
                filter.connect(gain);
                gain.connect(audioCtx.destination);
                
                noise.start(startTime);
            }
        }

        // 初始化
        updateSettings();
        document.addEventListener('click', initAudio, { once: true });
    </script>
</body>
</html>
