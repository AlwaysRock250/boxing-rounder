<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1A1A1A">
    <title>Boxing Rounder - 专业拳击计时器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        
        :root {
            --bg-primary: #1A1A1A;
            --bg-secondary: #2a2a2a;
            --accent-orange: #E85D04;
            --accent-green: #8BA5A3;
            --text-primary: #ffffff;
            --text-secondary: #8BA5A3;
            --card-bg: #8BA5A3;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .page {
            display: none;
            flex: 1;
            flex-direction: column;
        }
        
        .page.active {
            display: flex;
        }
        
        /* 统一顶部标题 */
        .top-header {
            text-align: center;
            padding: 15px;
            font-size: 16px;
            color: var(--text-secondary);
        }
        
        /* 统一主内容区 */
        .main-content {
            flex: 1;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
        }
        
        /* 统一卡片样式 */
        .timer-card, .settings-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 30px 20px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .settings-card {
            align-items: stretch;
        }
        
        /* 回合数 */
        .round-info, .settings-title {
            color: #1A1A1A;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            text-align: center;
        }
        
        /* 大时间显示 */
        .main-timer {
            font-size: 72px;
            font-weight: bold;
            color: #1A1A1A;
            font-variant-numeric: tabular-nums;
            line-height: 1;
            margin-bottom: 15px;
        }
        
        /* 状态标签 */
        .status-label {
            color: #1A1A1A;
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
        }
        
        /* 进度条 */
        .progress-container {
            width: 100%;
            height: 4px;
            background: rgba(26, 26, 26, 0.2);
            border-radius: 2px;
            margin-bottom: 30px;
            overflow: hidden;
        }
        
        .progress-bar {
            height: 100%;
            background: var(--accent-orange);
            border-radius: 2px;
            transition: width 1s linear;
        }
        
        /* 底部信息区 */
        .info-row {
            display: flex;
            justify-content: space-between;
            width: 100%;
            padding: 0 10px;
        }
        
        .info-item {
            text-align: center;
        }
        
        .info-label {
            color: rgba(26, 26, 26, 0.7);
            font-size: 14px;
            margin-bottom: 5px;
        }
        
        .info-value {
            color: #1A1A1A;
            font-size: 24px;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }
        
        /* 设置行 */
        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid rgba(26, 26, 26, 0.2);
        }
        
        .setting-row:last-child {
            border-bottom: none;
        }
        
        .setting-name {
            color: #1A1A1A;
            font-size: 16px;
            font-weight: 500;
        }
        
        .setting-control {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .setting-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 2px solid #1A1A1A;
            background: transparent;
            color: #1A1A1A;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .setting-btn:active {
            background: rgba(26, 26, 26, 0.2);
        }
        
        .setting-value {
            color: #1A1A1A;
            font-size: 20px;
            font-weight: bold;
            min-width: 60px;
            text-align: center;
        }
        
        /* 控制按钮区 */
        .controls-area {
            padding: 20px;
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 20px;
        }
        
        .control-btn-large {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: none;
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 28px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }
        
        .control-btn-large:active {
            transform: scale(0.95);
        }
        
        .control-btn-large.stop-btn {
            background: #c0392b;
        }
        
        .control-btn-large.stop-btn.holding {
            animation: hold-pulse 0.5s ease-in-out infinite;
        }
        
        @keyframes hold-pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(192, 57, 43, 0.7); }
            50% { transform: scale(0.95); box-shadow: 0 0 20px 10px rgba(192, 57, 43, 0); }
        }
        
        /* 长按提示 */
        .hold-hint {
            position: absolute;
            bottom: -25px;
            font-size: 10px;
            color: var(--text-secondary);
            white-space: nowrap;
        }
        
        /* 底部导航 */
        .bottom-nav {
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            background: var(--bg-secondary);
            border-top: 1px solid rgba(139, 165, 163, 0.2);
        }
        
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            color: var(--text-secondary);
            font-size: 12px;
            cursor: pointer;
            transition: color 0.2s;
        }
        
        .nav-item.active {
            color: var(--accent-orange);
        }
        
        .nav-icon {
            font-size: 24px;
        }
        
        /* 开始按钮 */
        .start-workout-btn {
            background: var(--accent-orange);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            width: 100%;
            margin-top: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .start-workout-btn:active {
            transform: scale(0.98);
        }
        
        /* 完成页 */
        .complete-card {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }
        
        .complete-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
        
        .complete-title {
            color: #1A1A1A;
            font-size: 28px;
            margin-bottom: 10px;
            font-weight: bold;
        }
        
        .complete-stats {
            color: rgba(26, 26, 26, 0.7);
            font-size: 16px;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <!-- 计时页面 -->
    <div id="timerPage" class="page active">
        <div class="top-header" id="pageTitle">锻炼开始</div>
        
        <div class="main-content">
            <div class="timer-card">
                <div class="round-info" id="roundDisplay">回合数: 1/15</div>
                <div class="main-timer" id="mainTimer">03:00</div>
                <div class="status-label" id="statusLabel">状态: 准备</div>
                
                <div class="progress-container">
                    <div class="progress-bar" id="progressBar" style="width: 0%"></div>
                </div>
                
                <div class="info-row">
                    <div class="info-item">
                        <div class="info-label">训练时间</div>
                        <div class="info-value" id="roundTimeDisplay">03:00</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">休息时间</div>
                        <div class="info-value" id="restTimeDisplay">01:00</div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="controls-area">
            <button class="control-btn-large" id="pauseBtn" onclick="togglePause()">⏸</button>
            <button class="control-btn-large stop-btn" id="stopBtn" ontouchstart="startHoldStop()" ontouchend="endHoldStop()" onmousedown="startHoldStop()" onmouseup="endHoldStop()" onmouseleave="endHoldStop()">
                ⏹
                <span class="hold-hint">长按结束</span>
            </button>
            <button class="control-btn-large" onclick="resetWorkout()">↻</button>
        </div>
        
        <div class="bottom-nav">
            <div class="nav-item active" onclick="switchToTimer()">
                <span class="nav-icon">⏱</span>
                <span>计时</span>
            </div>
            <div class="nav-item" onclick="switchToSettings()">
                <span class="nav-icon">⚙</span>
                <span>设置</span>
            </div>
        </div>
    </div>

    <!-- 设置页面 -->
    <div id="settingsPage" class="page">
        <div class="top-header">训练设置</div>
        
        <div class="main-content">
            <div class="settings-card">
                <div class="settings-title">训练参数</div>
                
                <div class="setting-row">
                    <span class="setting-name">回合时长</span>
                    <div class="setting-control">
                        <button class="setting-btn" onclick="adjustSetting('round', -10)">-</button>
                        <span class="setting-value" id="settingRound">03:00</span>
                        <button class="setting-btn" onclick="adjustSetting('round', 10)">+</button>
                    </div>
                </div>
                
                <div class="setting-row">
                    <span class="setting-name">休息时间</span>
                    <div class="setting-control">
                        <button class="setting-btn" onclick="adjustSetting('rest', -10)">-</button>
                        <span class="setting-value" id="settingRest">01:00</span>
                        <button class="setting-btn" onclick="adjustSetting('rest', 10)">+</button>
                    </div>
                </div>
                
                <div class="setting-row">
                    <span class="setting-name">回合数</span>
                    <div class="setting-control">
                        <button class="setting-btn" onclick="adjustSetting('rounds', -1)">-</button>
                        <span class="setting-value" id="settingRounds">15</span>
                        <button class="setting-btn" onclick="adjustSetting('rounds', 1)">+</button>
                    </div>
                </div>
            </div>
            
            <button class="start-workout-btn" onclick="startFromSettings()">开始训练</button>
        </div>
        
        <div class="bottom-nav">
            <div class="nav-item" onclick="switchToTimer()">
                <span class="nav-icon">⏱</span>
                <span>计时</span>
            </div>
            <div class="nav-item active" onclick="switchToSettings()">
                <span class="nav-icon">⚙</span>
                <span>设置</span>
            </div>
        </div>
    </div>

    <!-- 完成页面 -->
    <div id="completePage" class="page">
        <div class="main-content">
            <div class="timer-card" style="margin-top: auto; margin-bottom: auto;">
                <div class="complete-icon">🏆</div>
                <div class="complete-title">训练完成!</div>
                <div class="complete-stats" id="completeStats">共完成 15 回合</div>
                <button class="start-workout-btn" onclick="backToSettings()" style="margin-top: 30px;">返回设置</button>
            </div>
        </div>
        
        <div class="bottom-nav">
            <div class="nav-item" onclick="switchToTimer()">
                <span class="nav-icon">⏱</span>
                <span>计时</span>
            </div>
            <div class="nav-item" onclick="switchToSettings()">
                <span class="nav-icon">⚙</span>
                <span>设置</span>
            </div>
        </div>
    </div>

    <script>
        // ==================== 音频系统 ====================
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        // 1. 华为Petal倒计时（3声，1秒1声）
        function playCountdown3() {
            if (!audioCtx) return;
            const t = audioCtx.currentTime;
            
            for (let i = 0; i < 3; i++) {
                const startTime = t + i * 1.0;
                
                const osc1 = audioCtx.createOscillator();
                const gain1 = audioCtx.createGain();
                osc1.type = 'sine';
                osc1.frequency.value = 2000;
                
                gain1.gain.setValueAtTime(0, startTime);
                gain1.gain.linearRampToValueAtTime(0.46, startTime + 0.01);
                gain1.gain.setValueAtTime(0.46, startTime + 0.04);
                gain1.gain.linearRampToValueAtTime(0, startTime + 0.05);
                
                const osc2 = audioCtx.createOscillator();
                const gain2 = audioCtx.createGain();
                osc2.type = 'sine';
                osc2.frequency.value = 4000;
                
                gain2.gain.setValueAtTime(0, startTime);
                gain2.gain.linearRampToValueAtTime(0.025, startTime + 0.01);
                gain2.gain.setValueAtTime(0.025, startTime + 0.04);
                gain2.gain.linearRampToValueAtTime(0, startTime + 0.05);
                
                osc1.connect(gain1);
                gain1.connect(audioCtx.destination);
                osc2.connect(gain2);
                gain2.connect(audioCtx.destination);
                
                osc1.start(startTime);
                osc2.start(startTime);
                osc1.stop(startTime + 0.05);
                osc2.stop(startTime + 0.05);
            }
        }

        // 2. 板儿鼓：10秒倒计时（3声，京剧单皮鼓风格）- 精确移植
        function playBanGu() {
            if (!audioCtx) return;
            const t = audioCtx.currentTime;
            
            // 板儿鼓参数（来自参考代码）
            const pitch = 1100;      // 基频
            const crack = 85;        // 木质感
            const decayMs = 18;      // 余音
            const vel = 0.8;         // 力度
            
            const gain = vel;
            const decaySec = decayMs / 1000;
            const crackFactor = crack / 100;
            
            // 3声，间隔250ms
            for (let i = 0; i < 3; i++) {
                const startTime = t + i * 0.25;
                
                // ── Layer 1: 主体共鸣 ─────────────────────────
                const dur = decaySec * 3;
                const bufLen = Math.ceil(audioCtx.sampleRate * dur);
                const buf = audioCtx.createBuffer(1, bufLen, audioCtx.sampleRate);
                const d = buf.getChannelData(0);
                
                const f0 = pitch;
                const f1 = pitch * 2.73;   // 非谐波泛音 - 木质特征
                const f2 = pitch * 5.12;   // 高频泛音
                const f3 = pitch * 8.4;    // 极高频瞬态
                
                for (let j = 0; j < bufLen; j++) {
                    const tt = j / audioCtx.sampleRate;
                    
                    // 快衰减包络
                    const body = Math.exp(-tt / decaySec);
                    const click = Math.exp(-tt * 400);         // ~2ms点击
                    const crackEnv = Math.exp(-tt * 150) * crackFactor; // ~7ms破裂声
                    
                    const sig =
                        Math.sin(2 * Math.PI * f0 * tt) * body * 0.6 +
                        Math.sin(2 * Math.PI * f1 * tt) * body * 0.35 * crackFactor +
                        Math.sin(2 * Math.PI * f2 * tt) * crackEnv * 0.25 +
                        Math.sin(2 * Math.PI * f3 * tt) * click * 0.15 * crackFactor +
                        (Math.random() * 2 - 1) * click * 0.4 * crackFactor; // 噪声爆发
                    
                    d[j] = sig * gain;
                }
                
                const src = audioCtx.createBufferSource();
                src.buffer = buf;
                
                // 带通滤波 - 聚焦木质共振
                const bp = audioCtx.createBiquadFilter();
                bp.type = 'bandpass';
                bp.frequency.value = pitch * 1.1;
                bp.Q.value = 1.8 + crackFactor * 2;
                
                // 高频增强
                const hi = audioCtx.createBiquadFilter();
                hi.type = 'highshelf';
                hi.frequency.value = pitch * 2;
                hi.gain.value = 5 + crackFactor * 4;
                
                // 低频切除
                const lo = audioCtx.createBiquadFilter();
                lo.type = 'highpass';
                lo.frequency.value = pitch * 0.4;
                
                const masterGain = audioCtx.createGain();
                masterGain.gain.value = 1.2;
                
                src.connect(lo); lo.connect(bp); bp.connect(hi); hi.connect(masterGain);
                masterGain.connect(audioCtx.destination);
                src.start(startTime);
                
                // ── Layer 2: 鼓槌敲击 ─────────────────────────
                const stickLen = Math.ceil(audioCtx.sampleRate * 0.015);
                const stickBuf = audioCtx.createBuffer(1, stickLen, audioCtx.sampleRate);
                const sd = stickBuf.getChannelData(0);
                const stickFreq = pitch * 3.5;
                
                for (let j = 0; j < stickLen; j++) {
                    const tt = j / audioCtx.sampleRate;
                    sd[j] = (
                        Math.sin(2 * Math.PI * stickFreq * tt) +
                        (Math.random() * 2 - 1) * 0.6
                    ) * Math.exp(-tt * 600) * gain * crackFactor * 0.7;
                }
                
                const stickSrc = audioCtx.createBufferSource();
                stickSrc.buffer = stickBuf;
                const stickHi = audioCtx.createBiquadFilter();
                stickHi.type = 'highpass';
                stickHi.frequency.value = 2000;
                const stickGain = audioCtx.createGain();
                stickGain.gain.value = 0.8;
                
                stickSrc.connect(stickHi); stickHi.connect(stickGain); stickGain.connect(audioCtx.destination);
                stickSrc.start(startTime);
            }
        }

        // 3. 手掌锣开场铃：1声
        function playOpeningGong() {
            if (!audioCtx) return;
            createGongSound(400, 3.0, audioCtx.currentTime);
        }

        // 4. 手掌锣结束铃：2声
        function playEndGong() {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            createGongSound(400, 3.0, now);
            createGongSound(400, 3.0, now + 0.3);
        }

        // 手掌锣合成
        function createGongSound(baseFreq, duration, startTime) {
            const t = startTime || audioCtx.currentTime;
            const brightness = 0.8;
            
            const masterGain = audioCtx.createGain();
            masterGain.connect(audioCtx.destination);
            
            const harmonics = [1.0, 1.4, 1.9, 2.4, 3.1, 4.2, 5.5, 7.1];
            const harmonicAmps = [1.0, 0.7, 0.5, 0.35, 0.25, 0.18, 0.12, 0.08];
            
            harmonics.forEach((ratio, index) => {
                const freq = baseFreq * ratio;
                const baseAmp = harmonicAmps[index];
                const brightnessBoost = (index > 2) ? brightness : 1.0;
                const amplitude = baseAmp * brightnessBoost * 0.4;
                
                const decayFactor = 1.0 - (index * 0.1);
                const decayTime = duration * Math.max(decayFactor, 0.2);
                
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                osc.type = index < 2 ? 'sine' : 'triangle';
                osc.frequency.value = freq;
                
                gain.gain.setValueAtTime(0, t);
                gain.gain.linearRampToValueAtTime(amplitude, t + 0.005);
                gain.gain.setTargetAtTime(0.001, t + 0.005, decayTime * 0.2);
                
                osc.connect(gain);
                gain.connect(masterGain);
                
                osc.start(t);
                osc.stop(t + duration);
            });
            
            const humOsc = audioCtx.createOscillator();
            const humGain = audioCtx.createGain();
            humOsc.type = 'sine';
            humOsc.frequency.value = baseFreq * 0.5;
            humGain.gain.setValueAtTime(0, t);
            humGain.gain.linearRampToValueAtTime(0.15, t + 0.01);
            humGain.gain.setTargetAtTime(0.001, t + 0.01, duration * 0.4);
            humOsc.connect(humGain);
            humGain.connect(masterGain);
            humOsc.start(t);
            humOsc.stop(t + duration);
            
            const lfo = audioCtx.createOscillator();
            const lfoGain = audioCtx.createGain();
            lfo.frequency.value = 10;
            lfoGain.gain.value = 0.1;
            lfo.connect(lfoGain);
            lfoGain.connect(masterGain.gain);
            lfo.start(t);
            lfo.stop(t + duration * 0.5);
            
            const noiseBuffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.1, audioCtx.sampleRate);
            const noiseData = noiseBuffer.getChannelData(0);
            for (let i = 0; i < noiseData.length; i++) {
                noiseData[i] = (Math.random() * 2 - 1) * Math.exp(-i / (audioCtx.sampleRate * 0.02));
            }
            const noise = audioCtx.createBufferSource();
            noise.buffer = noiseBuffer;
            const noiseGain = audioCtx.createGain();
            noiseGain.gain.setValueAtTime(0.15, t);
            noiseGain.gain.exponentialRampToValueAtTime(0.01, t + 0.1);
            noise.connect(noiseGain);
            noiseGain.connect(masterGain);
            noise.start(t);
        }

        // ==================== 计时器逻辑 ====================
        let settings = {
            roundTime: 180,
            restTime: 60,
            rounds: 15
        };
        
        let timerState = {
            currentRound: 1,
            phase: 'prepare',
            timeLeft: 3,
            isPaused: false,
            wasPausedBeforeSettings: false,
            intervalId: null,
            totalTime: 0
        };

        let holdStopTimer = null;
        const HOLD_DURATION = 800; // 长按800ms触发

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function updateDisplay() {
            document.getElementById('roundDisplay').textContent = `回合数: ${timerState.currentRound}/${settings.rounds}`;
            document.getElementById('mainTimer').textContent = formatTime(timerState.timeLeft);
            document.getElementById('roundTimeDisplay').textContent = formatTime(settings.roundTime);
            document.getElementById('restTimeDisplay').textContent = formatTime(settings.restTime);
            
            let progress = 0;
            if (timerState.phase === 'round') {
                progress = ((settings.roundTime - timerState.timeLeft) / settings.roundTime) * 100;
            } else if (timerState.phase === 'rest') {
                progress = ((settings.restTime - timerState.timeLeft) / settings.restTime) * 100;
            } else if (timerState.phase === 'prepare') {
                progress = ((3 - timerState.timeLeft) / 3) * 100;
            }
            document.getElementById('progressBar').style.width = progress + '%';
            
            const statusMap = {
                prepare: '准备',
                round: '训练',
                rest: '休息'
            };
            document.getElementById('statusLabel').textContent = `状态: ${statusMap[timerState.phase]}`;
        }

        function updateSettingsDisplay() {
            document.getElementById('settingRound').textContent = formatTime(settings.roundTime);
            document.getElementById('settingRest').textContent = formatTime(settings.restTime);
            document.getElementById('settingRounds').textContent = settings.rounds;
        }

        // ==================== 页面切换（关键：设置页暂停） ====================
        function switchToTimer() {
            document.getElementById('settingsPage').classList.remove('active');
            document.getElementById('timerPage').classList.add('active');
            
            // 从设置页返回，恢复计时
            if (timerState.wasPausedBeforeSettings) {
                timerState.isPaused = false;
                timerState.wasPausedBeforeSettings = false;
                document.getElementById('pauseBtn').textContent = '⏸';
            }
            
            updateNavActive(0);
        }

        function switchToSettings() {
            // 进入设置页，暂停计时
            if (!timerState.isPaused && timerState.intervalId) {
                timerState.wasPausedBeforeSettings = true;
                timerState.isPaused = true;
                document.getElementById('pauseBtn').textContent = '▶';
            }
            
            document.getElementById('timerPage').classList.remove('active');
            document.getElementById('completePage').classList.remove('active');
            document.getElementById('settingsPage').classList.add('active');
            updateNavActive(1);
        }

        function updateNavActive(index) {
            document.querySelectorAll('.nav-item').forEach((item, i) => {
                item.classList.toggle('active', i === index);
            });
        }

        // ==================== 长按停止逻辑 ====================
        function startHoldStop() {
            const btn = document.getElementById('stopBtn');
            btn.classList.add('holding');
            
            holdStopTimer = setTimeout(() => {
                // 长按触发：结束训练
                stopAndReset();
                btn.classList.remove('holding');
            }, HOLD_DURATION);
        }

        function endHoldStop() {
            const btn = document.getElementById('stopBtn');
            btn.classList.remove('holding');
            
            if (holdStopTimer) {
                clearTimeout(holdStopTimer);
                holdStopTimer = null;
            }
        }

        function stopAndReset() {
            if (timerState.intervalId) {
                clearInterval(timerState.intervalId);
                timerState.intervalId = null;
            }
            
            // 重置状态
            timerState.currentRound = 1;
            timerState.phase = 'prepare';
            timerState.timeLeft = 3;
            timerState.isPaused = false;
            timerState.wasPausedBeforeSettings = false;
            timerState.totalTime = 0;
            
            document.getElementById('pauseBtn').textContent = '⏸';
            
            // 切换到设置页
            switchToSettings();
        }

        // ==================== 训练控制 ====================
        function startWorkout() {
            initAudio();
            timerState.currentRound = 1;
            timerState.phase = 'prepare';
            timerState.timeLeft = 3;
            timerState.isPaused = false;
            timerState.wasPausedBeforeSettings = false;
            timerState.totalTime = 0;
            
            playCountdown3();
            startTimer();
            updateDisplay();
        }

        function startFromSettings() {
            switchToTimer();
            startWorkout();
        }

        function startTimer() {
            if (timerState.intervalId) clearInterval(timerState.intervalId);
            
            timerState.intervalId = setInterval(() => {
                if (timerState.isPaused) return;
                
                timerState.timeLeft--;
                timerState.totalTime++;
                
                handleSounds();
                
                if (timerState.timeLeft <= 0) {
                    phaseTransition();
                }
                
                updateDisplay();
            }, 1000);
        }

        function handleSounds() {
            const { phase, timeLeft } = timerState;
            
            // 10秒警告：板儿鼓3声（精确移植版）
            if (phase === 'round' && timeLeft === 10) {
                playBanGu();
            }
            
            // 3秒倒计时：华为Petal
            if (phase === 'round' && timeLeft === 3) {
                playCountdown3();
            }
            
            if (phase === 'rest' && timeLeft === 3) {
                playCountdown3();
            }
        }

        function phaseTransition() {
            const { phase, currentRound } = timerState;
            
            switch(phase) {
                case 'prepare':
                    timerState.phase = 'round';
                    timerState.timeLeft = settings.roundTime;
                    playOpeningGong();
                    break;
                    
                case 'round':
                    playEndGong();
                    
                    if (currentRound >= settings.rounds) {
                        completeWorkout();
                        return;
                    }
                    
                    timerState.phase = 'rest';
                    timerState.timeLeft = settings.restTime;
                    break;
                    
                case 'rest':
                    timerState.currentRound++;
                    timerState.phase = 'round';
                    timerState.timeLeft = settings.roundTime;
                    playOpeningGong();
                    break;
            }
            
            updateDisplay();
        }

        function togglePause() {
            timerState.isPaused = !timerState.isPaused;
            document.getElementById('pauseBtn').textContent = timerState.isPaused ? '▶' : '⏸';
        }

        function resetWorkout() {
            // 重置当前回合
            if (timerState.phase === 'round') {
                timerState.timeLeft = settings.roundTime;
            } else if (timerState.phase === 'rest') {
                timerState.timeLeft = settings.restTime;
            } else {
                timerState.timeLeft = 3;
            }
            updateDisplay();
        }

        function completeWorkout() {
            if (timerState.intervalId) {
                clearInterval(timerState.intervalId);
                timerState.intervalId = null;
            }
            document.getElementById('completeStats').textContent = `共完成 ${settings.rounds} 回合 · 总时长 ${formatTime(timerState.totalTime)}`;
            document.getElementById('timerPage').classList.remove('active');
            document.getElementById('completePage').classList.add('active');
        }

        function backToSettings() {
            // 重置所有状态
            timerState.currentRound = 1;
            timerState.phase = 'prepare';
            timerState.timeLeft = 3;
            timerState.isPaused = false;
            timerState.wasPausedBeforeSettings = false;
            timerState.totalTime = 0;
            document.getElementById('pauseBtn').textContent = '⏸';
            
            switchToSettings();
        }

        function adjustSetting(type, delta) {
            if (type === 'round') {
                settings.roundTime = Math.max(10, Math.min(600, settings.roundTime + delta));
            } else if (type === 'rest') {
                settings.restTime = Math.max(10, Math.min(300, settings.restTime + delta));
            } else if (type === 'rounds') {
                settings.rounds = Math.max(1, Math.min(30, settings.rounds + delta));
            }
            updateSettingsDisplay();
        }

        // 初始化
        updateDisplay();
        updateSettingsDisplay();
        document.addEventListener('click', initAudio, { once: true });
    </script>
</body>
</html>
